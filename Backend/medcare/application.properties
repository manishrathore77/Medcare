# ---------------------------------------------------------------------------
# Medcare - Root application configuration (shared defaults)
# The runnable application uses medcare-service/src/main/resources/application.properties
# ---------------------------------------------------------------------------

spring.application.name=medcare

# Server (default; can be overridden in medcare-service)
server.port=8081

# JPA defaults
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Datasource (default H2; override in medcare-service for MySQL etc.)
spring.datasource.url=jdbc:h2:mem:medcare;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
