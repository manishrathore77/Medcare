# MySQL — active when spring.profiles.active includes "mysql" (see application.properties).
#
# Database: medcare_db. Full DDL aligned with JPA: ../schema.sql (this module root).
#   mysql -u root -p medcare_db < schema.sql
# User: root / root (override via env SPRING_DATASOURCE_* or a local profile).
#
# Schema upgrades: spring.jpa.hibernate.ddl-auto=update (in application.properties) lets Hibernate ADD tables/columns
# to match current Java entities on startup. For an existing MySQL dump, run first:
#   mysql -u root -p medcare_db < scripts/mysql/medcare_db_upgrade_jpa.sql
# (from repo Backend/medcare). Then start the app. Back up medcare_db before running scripts.

spring.datasource.url=jdbc:mysql://localhost:3306/medcare_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.h2.console.enabled=false
