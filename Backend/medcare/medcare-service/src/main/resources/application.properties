# Application name (aligns with root application.properties)
spring.application.name=medcare

# Active datasource: MySQL (see application-mysql.properties). For H2 in-memory only, use: spring.profiles.active=h2
spring.profiles.active=mysql

# Server (single port for this app)
server.port=8081

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 settings below apply when profile is h2 (not mysql). MySQL credentials/url are in application-mysql.properties.

# H2 (in-memory when spring.profiles.active=h2)
spring.datasource.url=jdbc:h2:mem:medcare;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional; disabled when profile mysql is active)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT (use a long secret in production; HS256 needs >= 256 bits of entropy for best practice)
jwt.secret=medcare-dev-jwt-secret-key-change-me-min-32-chars!!
jwt.expiration-ms=86400000

# Correlate all logs for a single HTTP request (see RequestCorrelationFilter + MDC requestId)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{requestId:-}] %logger{36} - %msg%n

# Extra detail: DEBUG shows list/get + in-method service logs; default INFO still shows creates/updates/deletes
# logging.level.com.medcare.service.service.impl=DEBUG
# logging.level.com.medcare.service.logging=DEBUG
