<div class="page">
  <div class="breadcrumb">
    <a routerLink="/admin/doctors">Doctors</a>
    <span>/</span>
    <span>{{ isCreate() ? 'New' : 'Edit' }}</span>
  </div>

  <h2 class="h2">{{ isCreate() ? 'Add doctor' : 'Edit doctor' }}</h2>

  @if (error()) {
    <div class="banner">{{ error() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="save()" class="card">
    <div class="row">
      <label>
        <span>First name</span>
        <input type="text" formControlName="firstName" autocomplete="given-name" />
      </label>
      <label>
        <span>Last name</span>
        <input type="text" formControlName="lastName" autocomplete="family-name" />
      </label>
    </div>
    <label>
      <span>Specialty</span>
      <input type="text" formControlName="specialty" />
    </label>
    <div class="row">
      <label>
        <span>License number</span>
        <input type="text" formControlName="licenseNumber" />
      </label>
      <label>
        <span>Contact number</span>
        <input type="tel" formControlName="contactNumber" />
      </label>
    </div>
    <label>
      <span>Email</span>
      <input type="email" formControlName="email" autocomplete="email" />
    </label>
    <div class="actions">
      <button type="submit" class="btn-primary" [disabled]="form.invalid">Save</button>
      <a routerLink="/admin/doctors" class="btn-ghost">Cancel</a>
      @if (!isCreate()) {
        <button type="button" class="btn-danger" (click)="remove()">Delete</button>
      }
    </div>
  </form>
</div>
