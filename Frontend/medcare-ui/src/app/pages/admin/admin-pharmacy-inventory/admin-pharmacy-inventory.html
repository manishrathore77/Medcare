<div class="page">
  <div class="breadcrumb">
    <a routerLink="/admin/pharmacy">Pharmacy</a>
    <span>/</span>
    <span>Inventory log</span>
  </div>

  <h2 class="h2">Inventory movements</h2>
  @if (error()) {
    <div class="banner">{{ error() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="card form-card">
    <h3 class="h3">Record movement</h3>
    <div class="row">
      <label>
        <span>Medicine</span>
        <select formControlName="medicineId">
          <option value="">Select…</option>
          @for (m of medicines(); track m.id) {
            <option [value]="m.id">{{ m.name }} ({{ m.batchNo }})</option>
          }
        </select>
      </label>
      <label>
        <span>Type</span>
        <select formControlName="changeType">
          <option value="IN">IN</option>
          <option value="OUT">OUT</option>
        </select>
      </label>
      <label>
        <span>Quantity</span>
        <input type="number" formControlName="quantity" min="1" />
      </label>
    </div>
    <label>
      <span>Reason</span>
      <input type="text" formControlName="reason" placeholder="Optional note" />
    </label>
    <button type="submit" class="btn-primary" [disabled]="form.invalid">Add log</button>
  </form>

  <div class="table-card">
    <div class="table-scroll">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Medicine ID</th>
            <th>Type</th>
            <th>Qty</th>
            <th>Reason</th>
          </tr>
        </thead>
        <tbody>
          @for (r of rows(); track r.id) {
            <tr>
              <td>{{ r.id }}</td>
              <td>{{ r.medicineId }}</td>
              <td>{{ r.changeType }}</td>
              <td>{{ r.quantity }}</td>
              <td>{{ r.reason }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
