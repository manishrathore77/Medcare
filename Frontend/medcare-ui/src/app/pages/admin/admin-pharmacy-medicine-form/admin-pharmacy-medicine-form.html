<div class="page">
  <div class="breadcrumb">
    <a routerLink="/admin/pharmacy">Pharmacy</a>
    <span>/</span>
    <a routerLink="/admin/pharmacy/medicines">Medicines</a>
    <span>/</span>
    <span>{{ isCreate() ? 'New' : 'Edit' }}</span>
  </div>

  <h2 class="h2">{{ isCreate() ? 'Add medicine' : 'Edit medicine' }}</h2>

  @if (error()) {
    <div class="banner">{{ error() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="save()" class="card">
    <label>
      <span>Name</span>
      <input type="text" formControlName="name" />
    </label>
    <label>
      <span>Batch number</span>
      <input type="text" formControlName="batchNo" />
    </label>
    <label>
      <span>Expiry date</span>
      <input type="date" formControlName="expiryDate" />
    </label>
    <div class="row">
      <label>
        <span>Stock quantity</span>
        <input type="number" formControlName="stockQuantity" min="0" />
      </label>
      <label>
        <span>Reorder level</span>
        <input type="number" formControlName="reorderLevel" min="0" />
      </label>
      <label>
        <span>Unit price</span>
        <input type="number" formControlName="unitPrice" min="0" step="0.01" />
      </label>
    </div>
    <div class="actions">
      <button type="submit" class="btn-primary" [disabled]="form.invalid">Save</button>
      <a routerLink="/admin/pharmacy/medicines" class="btn-ghost">Cancel</a>
      @if (!isCreate()) {
        <button type="button" class="btn-danger" (click)="remove()">Delete</button>
      }
    </div>
  </form>
</div>
