<div class="card">
  <h2 class="h2">My patients</h2>

  @if (error()) {
    <div class="banner">{{ error() }}</div>
  }

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Gender</th>
          <th>DOB</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (p of rows(); track p.id) {
          <tr>
            <td>
              <a [routerLink]="['/doctor/patients', p.id]" class="name-link">{{ p.firstName }} {{ p.lastName }}</a>
            </td>
            <td>{{ p.gender ?? '—' }}</td>
            <td>{{ p.dob ?? '—' }}</td>
            <td>
              <a [routerLink]="['/doctor/patients', p.id]" class="link">View</a>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
  @if (!error() && rows().length === 0) {
    <p class="muted">No patients yet — book visits with patients to see them here.</p>
  }
</div>
