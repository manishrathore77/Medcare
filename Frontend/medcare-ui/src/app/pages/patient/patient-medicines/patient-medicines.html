<div class="card">
  <h2 class="h2">Medicine catalog</h2>

  @if (error()) {
    <div class="banner">{{ error() }}</div>
  }

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Stock</th>
          <th>Price</th>
          <th>Expiry</th>
        </tr>
      </thead>
      <tbody>
        @for (m of rows(); track m.id) {
          <tr>
            <td>{{ m.name }}</td>
            <td>{{ m.stockQuantity }}</td>
            <td>${{ m.unitPrice | number: '1.2-2' }}</td>
            <td>{{ m.expiryDate ?? '—' }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
